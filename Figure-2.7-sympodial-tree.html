<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Aono-Kunii sympodial trees (figure 2.7)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin: 0; background: #f4f1ea; font-family: sans-serif; overflow: hidden; }
    #panel {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,255,255,0.94);
      padding: 12px 14px; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-size: 13px; min-width: 300px; z-index: 10;
    }
    #panel h3 { margin: 0 0 8px; font-size: 14px; }
    .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .row label { width: 60px; font-family: monospace; font-size: 12px; }
    .row input[type=range] { flex: 1; }
    .row .val { width: 50px; text-align: right; font-family: monospace; font-size: 12px; }
    .presets { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd; }
    .presets button {
      margin: 2px; padding: 4px 12px; font-family: monospace;
      background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
    }
    .presets button:hover { background: #e4e4e4; }
    .presets .active { background: #d0d8e8; border-color: #88a; }
    #hint { position: fixed; bottom: 10px; left: 12px; color:#666; font-size:12px; z-index:10; }
  </style>
</head>
<body>
<div id="panel">
  <h3>Figure 2.7 — Aono-Kunii sympodial trees</h3>
  <div class="row"><label>n</label><input type="range" id="N"  min="1" max="12"   step="1"   value="10"><span class="val" id="Nv">10</span></div>
  <div class="row"><label>r₁</label><input type="range" id="R1" min="0.5" max="1.0"  step="0.01" value="0.9"><span class="val" id="R1v">0.90</span></div>
  <div class="row"><label>r₂</label><input type="range" id="R2" min="0.3" max="1.0"  step="0.01" value="0.7"><span class="val" id="R2v">0.70</span></div>
  <div class="row"><label>a₁°</label><input type="range" id="A1" min="0"  max="90"   step="0.5" value="5"><span class="val" id="A1v">5.0</span></div>
  <div class="row"><label>a₂°</label><input type="range" id="A2" min="0"  max="90"   step="0.5" value="65"><span class="val" id="A2v">65.0</span></div>
  <div class="row"><label>wr</label><input type="range" id="WR" min="0.5" max="0.95" step="0.005" value="0.707"><span class="val" id="WRv">0.707</span></div>
  <div class="presets">
    presets:
    <button data-p="a">a</button>
    <button data-p="b">b</button>
    <button data-p="c">c</button>
    <button data-p="d">d</button>
  </div>
</div>
<div id="hint">drag to orbit · scroll to zoom</div>
<script>
const PRESETS = {
  a: { N:10, R1:0.9, R2:0.7, A1: 5, A2:65, WR:0.707 },
  b: { N:10, R1:0.9, R2:0.7, A1:10, A2:60, WR:0.707 },
  c: { N:10, R1:0.9, R2:0.8, A1:20, A2:50, WR:0.707 },
  d: { N:10, R1:0.9, R2:0.8, A1:35, A2:35, WR:0.707 },
};

let P = { ...PRESETS.a };
const RAD = Math.PI / 180;
const L0 = 100;
const W0 = 10;

let segments = [];
let sceneRadius = 1;

function expand(n) {
  let toks = [{t:'A', l:L0, w:W0}];
  for (let i = 0; i < n; i++) {
    const next = [];
    for (const tok of toks) {
      if (tok.t === 'A') {
        const l = tok.l, w = tok.w;
        next.push(
          {t:'!', a:w},
          {t:'F', a:l},
          {t:'['}, {t:'&', a:P.A1}, {t:'B', l:l*P.R1, w:w*P.WR}, {t:']'},
          {t:'/', a:180},
          {t:'['}, {t:'&', a:P.A2}, {t:'B', l:l*P.R2, w:w*P.WR}, {t:']'}
        );
      } else if (tok.t === 'B') {
        const l = tok.l, w = tok.w;
        next.push(
          {t:'!', a:w},
          {t:'F', a:l},
          {t:'['}, {t:'+', a:P.A1}, {t:'$'}, {t:'B', l:l*P.R1, w:w*P.WR}, {t:']'},
          {t:'['}, {t:'-', a:P.A2}, {t:'$'}, {t:'B', l:l*P.R2, w:w*P.WR}, {t:']'}
        );
      } else {
        next.push(tok);
      }
    }
    toks = next;
  }
  const final = [];
  for (const tok of toks) {
    if (tok.t === 'A' || tok.t === 'B') {
      final.push({t:'!', a:tok.w}, {t:'F', a:tok.l});
    } else {
      final.push(tok);
    }
  }
  return final;
}

function rot3(v, k, ang) {
  const c = Math.cos(ang), s = Math.sin(ang);
  const d = k[0]*v[0] + k[1]*v[1] + k[2]*v[2];
  return [
    v[0]*c + (k[1]*v[2] - k[2]*v[1])*s + k[0]*d*(1-c),
    v[1]*c + (k[2]*v[0] - k[0]*v[2])*s + k[1]*d*(1-c),
    v[2]*c + (k[0]*v[1] - k[1]*v[0])*s + k[2]*d*(1-c)
  ];
}

function dollarRotate(H) {
  const V = [0, 1, 0];
  let cx = V[1]*H[2] - V[2]*H[1];
  let cy = V[2]*H[0] - V[0]*H[2];
  let cz = V[0]*H[1] - V[1]*H[0];
  const cm = Math.sqrt(cx*cx + cy*cy + cz*cz);
  if (cm < 1e-9) return null;
  const L = [cx/cm, cy/cm, cz/cm];
  const U = [
    H[1]*L[2] - H[2]*L[1],
    H[2]*L[0] - H[0]*L[2],
    H[0]*L[1] - H[1]*L[0]
  ];
  return [L, U];
}

function buildSegments(tokens) {
  let H = [0, 1, 0], L = [-1, 0, 0], U = [0, 0, 1];
  let pos = [0, 0, 0];
  let w = 1;
  let parent = -1;
  const stack = [];
  const segs = [];

  for (const tok of tokens) {
    switch (tok.t) {
      case 'F': {
        const p0 = [...pos];
        pos = [pos[0]+tok.a*H[0], pos[1]+tok.a*H[1], pos[2]+tok.a*H[2]];
        const idx = segs.length;
        segs.push({ p0, p1: [...pos], w, parent, children: [] });
        if (parent >= 0) segs[parent].children.push(idx);
        parent = idx;
        break;
      }
      case '!': w = tok.a; break;
      case '+': { const a =  tok.a*RAD; H = rot3(H,U,a); L = rot3(L,U,a); break; }
      case '-': { const a = -tok.a*RAD; H = rot3(H,U,a); L = rot3(L,U,a); break; }
      case '&': { const a =  tok.a*RAD; H = rot3(H,L,a); U = rot3(U,L,a); break; }
      case '^': { const a = -tok.a*RAD; H = rot3(H,L,a); U = rot3(U,L,a); break; }
      case '/': { const a =  tok.a*RAD; L = rot3(L,H,a); U = rot3(U,H,a); break; }
      case '\\':{ const a = -tok.a*RAD; L = rot3(L,H,a); U = rot3(U,H,a); break; }
      case '$': { const r = dollarRotate(H); if (r) { L = r[0]; U = r[1]; } break; }
      case '[': stack.push({H:[...H], L:[...L], U:[...U], pos:[...pos], w, parent}); break;
      case ']': { const s = stack.pop(); H=s.H; L=s.L; U=s.U; pos=s.pos; w=s.w; parent=s.parent; break; }
    }
  }

  let maxW = 0;
  for (const seg of segs) {
    seg.w_start = seg.w;
    seg.w_end = seg.children.length > 0
      ? Math.max(...seg.children.map(c => segs[c].w))
      : seg.w * 0.6;
    if (seg.w_start > maxW) maxW = seg.w_start;
  }

  const bb = [Infinity,Infinity,Infinity,-Infinity,-Infinity,-Infinity];
  for (const seg of segs) {
    for (const p of [seg.p0, seg.p1]) {
      if (p[0]<bb[0]) bb[0]=p[0]; if (p[1]<bb[1]) bb[1]=p[1]; if (p[2]<bb[2]) bb[2]=p[2];
      if (p[0]>bb[3]) bb[3]=p[0]; if (p[1]>bb[4]) bb[4]=p[1]; if (p[2]>bb[5]) bb[5]=p[2];
    }
  }
  const cx = (bb[0]+bb[3])/2, cy = (bb[1]+bb[4])/2, cz = (bb[2]+bb[5])/2;
  const r = Math.max(bb[3]-bb[0], bb[4]-bb[1], bb[5]-bb[2]) / 2;

  const wBase = r * 0.012;
  for (const seg of segs) {
    seg.r_start = (seg.w_start / maxW) * wBase * 6;
    seg.r_end   = (seg.w_end   / maxW) * wBase * 6;
    seg.c0 = [seg.p0[0]-cx, -(seg.p0[1]-cy), seg.p0[2]-cz];
    seg.c1 = [seg.p1[0]-cx, -(seg.p1[1]-cy), seg.p1[2]-cz];
  }

  sceneRadius = r;
  return segs;
}

function regenerate() {
  segments = buildSegments(expand(P.N));
}

let cam;
let orbitEnabled = true;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  setAttributes('antialias', true);
  perspective(PI/3, width/height, 1, 1e6);
  cam = createCamera();

  const fmt = {
    N:  v => String(v|0),
    R1: v => (+v).toFixed(2),
    R2: v => (+v).toFixed(2),
    A1: v => (+v).toFixed(1),
    A2: v => (+v).toFixed(1),
    WR: v => (+v).toFixed(3),
  };

  for (const id of ['N','R1','R2','A1','A2','WR']) {
    const input = document.getElementById(id);
    const v = document.getElementById(id+'v');
    v.textContent = fmt[id](input.value);
    input.addEventListener('input', () => {
      P[id] = +input.value;
      v.textContent = fmt[id](input.value);
      clearActivePreset();
      regenerate();
    });
  }
  for (const btn of document.querySelectorAll('.presets button')) {
    btn.addEventListener('click', () => applyPreset(btn.dataset.p));
  }
  const panel = document.getElementById('panel');
  panel.addEventListener('pointerenter', () => { orbitEnabled = false; });
  panel.addEventListener('pointerleave', () => { orbitEnabled = true; });
  applyPreset('a');
}

function clearActivePreset() {
  for (const b of document.querySelectorAll('.presets button')) b.classList.remove('active');
}

function applyPreset(key) {
  const p = PRESETS[key];
  const fmt = {
    N:  v => String(v|0),
    R1: v => (+v).toFixed(2),
    R2: v => (+v).toFixed(2),
    A1: v => (+v).toFixed(1),
    A2: v => (+v).toFixed(1),
    WR: v => (+v).toFixed(3),
  };
  for (const k of Object.keys(p)) {
    P[k] = p[k];
    const inp = document.getElementById(k);
    if (inp) {
      inp.value = p[k];
      const v = document.getElementById(k+'v');
      if (v) v.textContent = fmt[k](p[k]);
    }
  }
  clearActivePreset();
  document.querySelector(`.presets button[data-p="${key}"]`).classList.add('active');
  regenerate();
  placeCamera();
  orbitEnabled = true;
}

function placeCamera() {
  const d = sceneRadius * 2.6;
  cam.setPosition(0, 0, d);
  cam.lookAt(0, 0, 0);
  cam.upX = 0; cam.upY = 1; cam.upZ = 0;
}

function frustumMesh(r0, r1, h, sides) {
  const a = TWO_PI / sides;
  beginShape(TRIANGLE_STRIP);
  for (let i = 0; i <= sides; i++) {
    const c = Math.cos(i*a), s = Math.sin(i*a);
    normal(c, 0, s);
    vertex(r0*c, -h/2, r0*s);
    vertex(r1*c,  h/2, r1*s);
  }
  endShape();
}

function drawSegment(seg) {
  const dx = seg.c1[0]-seg.c0[0];
  const dy = seg.c1[1]-seg.c0[1];
  const dz = seg.c1[2]-seg.c0[2];
  const len = Math.sqrt(dx*dx+dy*dy+dz*dz);
  if (len < 1e-9) return;

  const vx = dx/len, vy = dy/len, vz = dz/len;
  let ux, uy, uz;
  if (Math.abs(vx) < 0.9) { ux = 1; uy = 0; uz = 0; }
  else                    { ux = 0; uy = 0; uz = 1; }
  const dot = ux*vx + uy*vy + uz*vz;
  ux -= dot*vx; uy -= dot*vy; uz -= dot*vz;
  const ul = Math.sqrt(ux*ux+uy*uy+uz*uz); ux/=ul; uy/=ul; uz/=ul;
  const wx = vy*uz - vz*uy, wy = vz*ux - vx*uz, wz = vx*uy - vy*ux;

  const mx = (seg.c0[0]+seg.c1[0])/2;
  const my = (seg.c0[1]+seg.c1[1])/2;
  const mz = (seg.c0[2]+seg.c1[2])/2;

  push();
  applyMatrix(
    ux, uy, uz, 0,
    vx, vy, vz, 0,
    wx, wy, wz, 0,
    mx, my, mz, 1
  );
  const sides = seg.r_start * 30 / sceneRadius > 0.6 ? 10 : 6;
  frustumMesh(seg.r_start, seg.r_end, len, sides);
  pop();
}

function draw() {
  background(244, 241, 234);
  if (orbitEnabled) orbitControl(2, 2, 0.1);

  ambientLight(110, 100, 92);
  directionalLight(220, 210, 195, -0.4, 0.7, -0.6);
  directionalLight(80, 75, 70, 0.6, 0.4, 0.5);

  ambientMaterial(70, 50, 38);
  noStroke();

  for (const seg of segments) drawSegment(seg);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  perspective(PI/3, width/height, 1, 1e6);
  placeCamera();
}
</script>
</body>
</html>

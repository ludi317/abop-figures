<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pineapple — cylindrical phyllotaxis (figure 4.15)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    body { margin: 0; background: #f4f1ea; font-family: sans-serif; overflow: hidden; }
    #panel {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,255,255,0.94);
      padding: 12px 14px; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      font-size: 13px; min-width: 320px; z-index: 10;
    }
    #panel h3 { margin: 0 0 8px; font-size: 14px; }
    .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
    .row label { width: 70px; font-family: monospace; font-size: 12px; }
    .row input[type=range] { flex: 1; }
    .row .val { width: 70px; text-align: right; font-family: monospace; font-size: 12px; }
    .presets { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd; }
    .presets button {
      margin: 2px; padding: 4px 12px; font-family: monospace;
      background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;
    }
    .presets button:hover { background: #e4e4e4; }
    .presets .active { background: #d0d8e8; border-color: #88a; }
    #panel .sub { color:#666; font-size: 11px; margin-bottom: 8px; font-family: monospace; }
    #info { font-family: monospace; font-size: 11px; color: #555; margin-top: 8px; }
    #hint { position: fixed; bottom: 10px; left: 12px; color:#666; font-size:12px; z-index:10; }
  </style>
</head>
<body>
<div id="panel">
  <h3>Figure 4.15 — Pineapple (cylindrical phyllotaxis)</h3>
  <div class="sub">φ = n·α, y = n·h, r = R</div>
  <div class="row"><label>α°</label><input type="range" id="A" min="130" max="145" step="0.0001" value="138.139542"><span class="val" id="Av">138.1395</span></div>
  <div class="row"><label>scales</label><input type="range" id="N" min="40" max="220" step="1" value="130"><span class="val" id="Nv">130</span></div>
  <div class="row"><label>h</label><input type="range" id="H" min="0.02" max="0.12" step="0.001" value="0.042"><span class="val" id="Hv">0.042</span></div>
  <div class="row"><label>radius</label><input type="range" id="R" min="80" max="180" step="1" value="120"><span class="val" id="Rv">120</span></div>
  <div class="row"><label>taper</label><input type="range" id="T" min="0" max="1" step="0.01" value="0.55"><span class="val" id="Tv">0.55</span></div>
  <div class="row"><label>crown</label><input type="range" id="C" min="0" max="40" step="1" value="22"><span class="val" id="Cv">22</span></div>
  <div class="presets">
    presets:
    <button data-p="pineapple">(5,8,13) pineapple</button>
    <button data-p="spruce">(5,8) spruce</button>
    <button data-p="cyl">cylindrical</button>
  </div>
  <div id="info"></div>
</div>
<div id="hint">drag to orbit · scroll to zoom · α = 138.139542° gives 5/8/13 parastichies</div>
<script>
const PRESETS = {
  pineapple: { A:138.139542, N:130, H:0.042, R:120, T:0.55, C:22 },
  spruce:    { A:137.5,      N:90,  H:0.045, R:90,  T:0.65, C:0  },
  cyl:       { A:137.5,      N:130, H:0.042, R:120, T:0.0,  C:0  },
};

let P = { ...PRESETS.pineapple };
const RAD = Math.PI / 180;
let pointerOnPanel = false;
let panelDragging = false;
function orbitEnabled() { return !pointerOnPanel && !panelDragging; }

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  setAttributes('antialias', true);
  perspective(PI/3, width/height, 1, 1e6);

  const fmt = {
    A: v => (+v).toFixed(4),
    N: v => String(v|0),
    H: v => (+v).toFixed(3),
    R: v => String(v|0),
    T: v => (+v).toFixed(2),
    C: v => String(v|0),
  };

  for (const id of ['A','N','H','R','T','C']) {
    const input = document.getElementById(id);
    const v = document.getElementById(id+'v');
    v.textContent = fmt[id](input.value);
    input.addEventListener('input', () => {
      P[id] = +input.value;
      v.textContent = fmt[id](input.value);
      clearActivePreset();
    });
  }
  for (const btn of document.querySelectorAll('.presets button')) {
    btn.addEventListener('click', () => applyPreset(btn.dataset.p));
  }
  const panel = document.getElementById('panel');
  panel.addEventListener('pointerenter', () => { pointerOnPanel = true; });
  panel.addEventListener('pointerleave', () => { pointerOnPanel = false; });
  panel.addEventListener('pointerdown', () => { panelDragging = true; });
  window.addEventListener('pointerup',   () => { panelDragging = false; });
  panel.addEventListener('wheel', (e) => e.stopPropagation());
  applyPreset('pineapple');
}

function clearActivePreset() {
  for (const b of document.querySelectorAll('.presets button')) b.classList.remove('active');
}

function applyPreset(key) {
  const p = PRESETS[key];
  const fmt = {
    A: v => (+v).toFixed(4),
    N: v => String(v|0),
    H: v => (+v).toFixed(3),
    R: v => String(v|0),
    T: v => (+v).toFixed(2),
    C: v => String(v|0),
  };
  for (const k of Object.keys(p)) {
    P[k] = p[k];
    const inp = document.getElementById(k);
    if (inp) {
      inp.value = p[k];
      const v = document.getElementById(k+'v');
      if (v) v.textContent = fmt[k](p[k]);
    }
  }
  clearActivePreset();
  document.querySelector(`.presets button[data-p="${key}"]`).classList.add('active');
  document.getElementById('info').textContent =
    `divergence ${P.A.toFixed(4)}° → 5/8/13 parastichies (Table 4.1)`;
}

function radiusProfile(t) {
  const taper = P.T;
  if (taper <= 0) return 1;
  const top = 1 - Math.pow(t, 3) * taper;
  const bot = 1 - Math.pow(1 - t, 4) * taper * 0.85;
  return Math.max(0.05, top * bot);
}

function computeHexVerts(alpha, hStep, r0) {
  const offsets = [];
  for (const k of [5, 8, 13, -5, -8, -13]) {
    let dphi = k * alpha;
    dphi = ((dphi + Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
    const ds = dphi * r0;
    const dH = k * hStep;
    offsets.push({ ds, dH, dphi });
  }
  offsets.sort((a,b) => Math.atan2(a.dH, a.ds) - Math.atan2(b.dH, b.ds));

  const verts = [];
  for (let i = 0; i < 6; i++) {
    const a = offsets[i];
    const b = offsets[(i+1) % 6];
    const det = 2 * (a.ds * b.dH - a.dH * b.ds);
    const aSq = a.ds*a.ds + a.dH*a.dH;
    const bSq = b.ds*b.ds + b.dH*b.dH;
    const vx = (b.dH * aSq - a.dH * bSq) / det;
    const vy = (a.ds * bSq - b.ds * aSq) / det;
    verts.push({ ds: vx, dH: vy });
  }
  return verts;
}

function drawHexScale(phi, yC, r, hexVerts, bumpOut) {
  const cx = r * Math.cos(phi);
  const cz = r * Math.sin(phi);
  const cy = yC + bumpOut * 0.0;
  const nxC = Math.cos(phi);
  const nzC = Math.sin(phi);
  const pcx = cx + nxC * bumpOut;
  const pcy = cy;
  const pcz = cz + nzC * bumpOut;

  const wv = hexVerts.map(v => {
    const dphi = v.ds / r;
    const px = r * Math.cos(phi + dphi);
    const pz = r * Math.sin(phi + dphi);
    const py = yC + v.dH;
    return { x: px, y: py, z: pz };
  });

  const nx = nxC, ny = 0, nz = nzC;
  beginShape(TRIANGLES);
  normal(nx, ny, nz);
  for (let i = 0; i < 6; i++) {
    const a = wv[i];
    const b = wv[(i+1) % 6];
    vertex(pcx, pcy, pcz);
    vertex(a.x, a.y, a.z);
    vertex(b.x, b.y, b.z);
  }
  endShape();
}

function drawLeaf(cx, cy, cz, dirX, dirY, dirZ, len, width, curl) {
  let ux = 0, uy = 0, uz = 1;
  const dot = ux*dirX + uy*dirY + uz*dirZ;
  ux -= dot*dirX; uy -= dot*dirY; uz -= dot*dirZ;
  const ul = Math.sqrt(ux*ux+uy*uy+uz*uz);
  if (ul < 1e-6) { ux = 1; uy = 0; uz = 0; }
  else { ux/=ul; uy/=ul; uz/=ul; }
  const sx = dirY*uz - dirZ*uy;
  const sy = dirZ*ux - dirX*uz;
  const sz = dirX*uy - dirY*ux;

  const segs = 8;
  beginShape(TRIANGLE_STRIP);
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const w = width * (1 - t*t) * 0.5;
    const droop = curl * t * t;
    const x = cx + dirX*len*t - 0*droop + ux*0;
    const y = cy + dirY*len*t + droop;
    const z = cz + dirZ*len*t;
    normal(sx, sy, sz);
    vertex(x + sx*w, y + sy*w, z + sz*w);
    vertex(x - sx*w, y - sy*w, z - sz*w);
  }
  endShape();
}

function draw() {
  background(244, 241, 234);
  if (orbitEnabled()) orbitControl(2, 2, 0.1);

  ambientLight(110, 105, 95);
  directionalLight(220, 210, 195, -0.4, 0.7, -0.6);
  directionalLight(80, 75, 70, 0.6, 0.4, 0.5);

  const N = P.N|0;
  const alpha = P.A * RAD;
  const h = P.H * P.R;
  const totalH = N * h;
  const yBase = totalH / 2;

  const hexVerts = computeHexVerts(alpha, h, P.R);
  const bump = 0.18 * P.R * P.H * 5;

  noStroke();
  ambientMaterial(190, 130, 50);
  for (let n = 0; n < N; n++) {
    const t = n / Math.max(N - 1, 1);
    const rp = radiusProfile(t);
    const r = P.R * rp;
    const phi = n * alpha;
    const y = yBase - n * h;
    drawHexScale(phi, y, r, hexVerts, bump * rp);
  }

  if (P.C > 0) {
    const crownBase = yBase + h * 0.5;
    const crownR = P.R * radiusProfile(1) * 0.9;
    ambientMaterial(50, 110, 50);
    for (let i = 0; i < P.C; i++) {
      const ph = (i / P.C) * Math.PI * 2 + 0.3;
      const tier = i % 3;
      const tierR = crownR * (0.3 + 0.5 * (1 - tier/3));
      const tierY = crownBase + tier * P.R * 0.04;
      const cx = tierR * Math.cos(ph);
      const cz = tierR * Math.sin(ph);
      const upTilt = 0.85;
      const outTilt = 0.5 - tier * 0.1;
      const dx = outTilt * Math.cos(ph);
      const dy = upTilt;
      const dz = outTilt * Math.sin(ph);
      const dl = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const len = P.R * (1.0 + 0.4*Math.random()) * (1 - tier*0.15);
      const wid = P.R * 0.10;
      drawLeaf(cx, tierY, cz, dx/dl, dy/dl, dz/dl, len, wid, P.R*0.15);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  perspective(PI/3, width/height, 1, 1e6);
}
</script>
</body>
</html>
